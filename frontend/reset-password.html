<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="login-page">
    <div class="Sign_in">
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password</p>
        <form id="resetPasswordForm">
            <input type="password" id="newPassword" placeholder="New password (min 8 chars)" required>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            <button type="submit" id="resetPasswordBtn" class="login-btn">Reset Password</button>
        </form>
        <div class="registrar">
            <a href="login.html">← Back to Login</a>
        </div>
        <div id="reset-error" class="error-message"></div>
    </div>
    <script type="module" src="src/js/reset.js"></script>
</body>
</html>
