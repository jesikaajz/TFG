<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="login-page">
    <div class="Sign_in">
        <h1>Change Password</h1>
        <p class="subtitle">You must change your temporary password to continue</p>
        <form id="changePasswordForm">
            <input type="password" id="currentPassword" placeholder="Current password" required>
            <input type="password" id="newPassword" placeholder="New password (min 8 chars)" required>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            <button type="submit" id="changePasswordBtn" class="login-btn">Update Password</button>
        </form>
        <div id="change-error" class="error-message"></div>
    </div>
    <script type="module" src="src/js/change-password.js"></script>
</body>
</html>
