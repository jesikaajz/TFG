<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="login-page">
    <div class="Sign_in">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your email to receive a reset link</p>
        <form id="forgotPasswordForm">
            <input type="email" id="forgotEmail" placeholder="Email address" required>
            <button type="submit" id="sendResetLinkBtn" class="login-btn">Send Reset Link</button>
        </form>
        <div class="registrar">
            <a href="login.html">← Back to Login</a>
        </div>
        <div id="forgot-error" class="error-message"></div>
    </div>
    <script type="module" src="src/js/forgot.js"></script>
</body>
</html>
