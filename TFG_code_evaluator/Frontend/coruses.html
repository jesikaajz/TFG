<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Courses</title>
</head>
<body class="app">
<header class="header">
    <div class="header-left">
        <span class="logo">Aplicación</span>
        <div class="menu-toggle">☰</div>
    </div>
    <div class="header-center">
        <span>Student Portal</span>
    </div>
    <div class="header-right">
        <div class="noti">
            <img src="notificacion.png" class="icon">
        </div>
        <div class="divider"></div>
        <div class="user">
            <div class="avatar">S</div>
            <span>Student User</span>
        </div>
    </div>
</header>
<div class="layout">
    <aside class="sidebar">
        <p class="menu-title">MENU</p>
        <button class="menu-item">
            <img src="dashboard.png" class="icon">
            <span>Dashboard</span>
        </button>
        <button class="menu-item">
            <img src="courses.png" class="icon">
            <span>Courses</span>
        </button>
        <button class="menu-item">
            <img src="exercises.png" class="icon">
            <span>Exercises</span>
        </button>
        <button class="menu-item"> 
            <img src="submissions.png" class="icon">
            <span>Submissions</span>
        </button>
        <button class="menu-item">
            <img src="reports.png" class="icon">
            <span>Reports</span>
        </button>
    </aside>
    <main class="content">
    </main>  
</div>
</body>
</html>
