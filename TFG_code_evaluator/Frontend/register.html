<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registrar</title>
</head>
<body class ="register-page">
    <div class="Reg_in">
        <h1>Crea una cuenta</h1>
        <p class="subtitle">Bienvenido, introduce tus datos</p>
        <form id="RegForm" method="POST">
            <label>Nombre</label>
            <input type="nombre" placeholder="Jose Luis Sanchez" name="nombre" required>

            <label>Email</label>
            <input type="email" placeholder="you@example.com" name="email" required>

            <label>Contraseña</label>
            <input type="password" placeholder="••••••••" name="password" required>

            <label>Confirmar Contraseña</label>
            <input type="password2" placeholder="••••••••" name="password2" required>

            <button type="submit" class="registrar-btn">Iniciar Sesión</button>
            <div class="registrar">
                <span>Ya tienes cuenta?</span>
                <a href="#">Iniciar Sessión</a>
            </div>
        </form>
    </div>
</body>
</html>
